@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;800&display=swap');
:root{
  --ft:'Noto Sans TC','Helvetica Neue',sans-serif;

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{min-height:100%;background:var(--bg);color:var(--t1);font-family:var(--ft);-webkit-font-smoothing:antialiased;font-size:15px}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit;color:var(--t1)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

#app{background:var(--bg);min-height:100vh;max-width:430px;margin:0 auto;color:var(--t1);position:relative}
.card{background:var(--sf);border-radius:var(--rd);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03)}
.tnum{font-variant-numeric:tabular-nums}
.toast{position:fixed;top:28px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;font-weight:600;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.15)}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.fade{animation:fadein .15s ease}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid #E8E4DE;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,8px)}

</style>

var fmt = function(n){ return "$" + Number(n||0).toLocaleString(); };

function gr(t,id){ for(var i=0;i<t.length;i++){ if(t[i].id===id) return t[i]; } return null; }
function fn(t,p){ var n=null, ch=t; for(var i=0;i<p.length;i++){ n=null; for(var j=0;j<ch.length;j++){ if(ch[j].id===p[i]){ n=ch[j]; break; } } if(!n) return null; ch=n.children||[]; } return n; }
function bl(t,p){ var r=[], ch=t; for(var i=0;i<p.length;i++){ var found=null; for(var j=0;j<ch.length;j++){ if(ch[j].id===p[i]){ found=ch[j]; break; } } if(!found) break; r.push(found.label); ch=found.children||[]; } return r; }
function psw(ep,pf){ if(pf.length>ep.length) return false; for(var i=0;i<pf.length;i++){ if(ep[i]!==pf[i]) return false; } return true; }
function pe(a,b){ if(a.length!==b.length) return false; for(var i=0;i<a.length;i++){ if(a[i]!==b[i]) return false; } return true; }
function cStores(ns,pp){ var r=[]; for(var i=0;i<ns.length;i++){ var n=ns[i]; var p=pp.concat([n.id]); if(n.isStore) r.push(m(n,{treePath:p})); if(n.children) r=r.concat(cStores(n.children,p)); } return r; }
function cLeaves(ns,pp){ var r=[]; for(var i=0;i<ns.length;i++){ var n=ns[i]; var p=pp.concat([n.id]); if(!n.children||n.children.length===0) r.push(m(n,{treePath:p})); else r=r.concat(cLeaves(n.children,p)); } return r; }
function cloneT(t){ return t.map(function(n){ return m(n,{children:n.children?cloneT(n.children):undefined}); }); }
function addNode(t,pp,nn){ var c=cloneT(t); if(pp.length===0){ c.push(nn); return c; } var p=fn(c,pp); if(p){ if(!p.children) p.children=[]; p.children.push(nn); } return c; }

function cleanT(t,entries,today){
  var cut = new Date(new Date(today).getTime() - EXPIRE_DAYS*DAY_MS).toISOString().slice(0,10);
  function hasRecent(np){ return entries.some(function(e){ return psw(e.path,np) && e.date>=cut; }); }
  function hasAny(np){ return entries.some(function(e){ return psw(e.path,np); }); }
  function cl(ns,pp){
    return ns.filter(function(n){
      var np = pp.concat([n.id]);
      if(n.permanent){ if(n.children) n.children=cl(n.children,np); return true; }
      if(hasRecent(np)){ if(n.children) n.children=cl(n.children,np); return true; }
      if(n.createdAt && n.createdAt>=cut){ if(n.children) n.children=cl(n.children,np); return true; }
      if(n.system && !hasAny(np)){ if(n.children) n.children=cl(n.children,np); return true; }
      return false;
    });
  }
  return cl(cloneT(t),[]);
}

  function bs(ch,pp){ var secs=[]; (ch||[]).forEach(function(c){ var p=pp.concat([c.id]); if(c.children&&c.children.length>0){ var items=bi(c.children,p); if(items.length>0) secs.push({label:c.label,items:items}); } else { var mm=null; for(var i=0;i<secs.length;i++){ if(secs[i].label==="品項"){ mm=secs[i]; break; } } if(!mm){ mm={label:"品項",items:[]}; secs.push(mm); } mm.items.push({id:"q_"+p.join("_"),label:c.label,price:getLP(p),path:p,addVeg:c.addVeg}); } }); return secs; }
  if(!sn.children||sn.children.length===0){ return {id:sp.join("_"),label:sn.label,icon:icon,color:color,sections:[{label:"品項",items:[{id:"q_"+sp.join("_"),label:sn.label,price:getLP(sp),path:sp}]}]}; }
  return {id:sp.join("_"),label:sn.label,icon:icon,color:color,sections:bs(sn.children,sp)};
}

/* ═══════════ 加密 (AES-GCM via Web Crypto) ═══════════ */
var enc = new TextEncoder(); var dec = new TextDecoder();
var cryptoKey = null; var cryptoKeyPhrase = null;
var FIXED_SALT = enc.encode('budget-fixed-salt-2026');
function bufToB64(buf){ var bytes=new Uint8Array(buf); var s=''; for(var i=0;i<bytes.length;i++) s+=String.fromCharCode(bytes[i]); return btoa(s); }
function b64ToBuf(b64){ var s=atob(b64); var bytes=new Uint8Array(s.length); for(var i=0;i<s.length;i++) bytes[i]=s.charCodeAt(i); return bytes.buffer; }
async function deriveKey(passphrase){
  if(cryptoKey && cryptoKeyPhrase===passphrase) return cryptoKey;
  var baseKey = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  cryptoKey = await crypto.subtle.deriveKey({name:'PBKDF2',salt:FIXED_SALT,iterations:100000,hash:'SHA-256'}, baseKey, {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']);
  cryptoKeyPhrase = passphrase; return cryptoKey;
}
async function encryptObj(obj, passphrase){
  var key=await deriveKey(passphrase); var iv=crypto.getRandomValues(new Uint8Array(12));
  var ct=await crypto.subtle.encrypt({name:'AES-GCM',iv:iv}, key, enc.encode(JSON.stringify(obj)));
  return { iv:bufToB64(iv), ct:bufToB64(ct) };
}
async function decryptObj(payload, passphrase){
  var key=await deriveKey(passphrase); var iv=new Uint8Array(b64ToBuf(payload.iv));
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv}, key, b64ToBuf(payload.ct));
  return JSON.parse(dec.decode(pt));
}

/* ═══════════ Firebase 同步引擎 ═══════════ */
var sync = { fb:null, dbRef:null, unsub:null, state:'off', lastError:'', pending:false };
function fbConfigValid(){ return FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey.indexOf('貼上')===-1; }
function initFirebase(){
  if(sync.fb) return true;
  if(!fbConfigValid() || typeof firebase==='undefined') return false;
  try{
    sync.fb = firebase.initializeApp(FIREBASE_CONFIG);
    var fs = firebase.firestore();
    try{ fs.enablePersistence({synchronizeTabs:true}).catch(function(){}); }catch(e){}
    sync.dbRef = fs.collection('budget_records'); return true;
  }catch(e){ sync.lastError=e.message; sync.state='error'; return false; }
}
function renderSyncBar(){ if(ui.view==='settings') render(); }
async function pushRecord(item){
  if(!sync.dbRef || !db.sync.passphrase) return;
  try{
    var payload = await encryptObj(item, db.sync.passphrase);
    await sync.dbRef.doc(String(item.id)).set({ iv:payload.iv, ct:payload.ct, updatedAt:item.updatedAt||Date.now() });
    if(sync.pending){ sync.pending=false; renderSyncBar(); }
  }catch(e){ sync.pending=true; renderSyncBar(); }
}
async function pushAll(){
  if(!sync.dbRef || !db.sync.passphrase) return;
  for(var i=0;i<db.entries.length;i++){ await pushRecord(db.entries[i]); }
}
function mergeRecord(remote){
  var idx=-1; for(var i=0;i<db.entries.length;i++){ if(String(db.entries[i].id)===String(remote.id)){ idx=i; break; } }
  if(idx===-1){ if(remote.deleted) return false; db.entries.push(remote); return true; }
  var local=db.entries[idx];
  if((remote.updatedAt||0) > (local.updatedAt||0)){
    if(remote.deleted){ db.entries.splice(idx,1); return true; }
    db.entries[idx]=remote; return true;
  }
  return false;
}
function startListening(){
  if(!sync.dbRef || !db.sync.passphrase){ sync.state='nokey'; renderSyncBar(); return; }
  if(sync.unsub) sync.unsub();
  sync.state='connecting'; renderSyncBar();
  sync.unsub = sync.dbRef.onSnapshot(async function(snap){
    var changed=false;
    for(var i=0;i<snap.docs.length;i++){
      var d=snap.docs[i].data(); if(!d||!d.ct) continue;
      try{ var item=await decryptObj({iv:d.iv,ct:d.ct}, db.sync.passphrase); changed=mergeRecord(item)||changed; }catch(e){ continue; }
    }
    sync.state='on';
    if(changed){ saveDB(); render(); } else renderSyncBar();
  }, function(err){ sync.state='error'; sync.lastError=err.message; renderSyncBar(); });
}
async function enableSync(){
  if(!db.sync.passphrase){ sync.state='nokey'; renderSyncBar(); return; }
  if(!initFirebase()){ if(sync.state!=='error') sync.state='error'; renderSyncBar(); return; }
  db.sync.enabled=true; saveDB(); startListening(); await pushAll();
}
function stopSync(){ if(sync.unsub){ sync.unsub(); sync.unsub=null; } sync.state='off'; renderSyncBar(); }
function pushEntry(item){ if(sync.state==='on'||sync.state==='connecting') pushRecord(item); }
function pushDelete(id){ if(sync.state==='on'||sync.state==='connecting') pushRecord({id:id,deleted:true,updatedAt:Date.now()}); }

function pieChartHTML(data){
  var hasData = data.filter(function(d){ return d.total>0; });
  var grand = hasData.reduce(function(s,d){ return s+d.total; },0);
  if(grand===0) return '<div style="text-align:center;color:#8E8E93;padding:30px">尚無紀錄</div>';
  var size=200, cx=100, cy=100, r=80, ir=50;
  var cum=-90;
  function p2c(radius,ang){ var rad=ang*Math.PI/180; return {x:cx+radius*Math.cos(rad), y:cy+radius*Math.sin(rad)}; }
  function arc(startA,sweep){ if(sweep>=359.99) sweep=359.99; var s1=p2c(r,startA), e1=p2c(r,startA+sweep), s2=p2c(ir,startA+sweep), e2=p2c(ir,startA); var large=sweep>180?1:0; return "M"+s1.x+","+s1.y+" A"+r+","+r+" 0 "+large+" 1 "+e1.x+","+e1.y+" L"+s2.x+","+s2.y+" A"+ir+","+ir+" 0 "+large+" 0 "+e2.x+","+e2.y+" Z"; }
  var paths='';
  hasData.forEach(function(d){ var pct=d.total/grand; var sa=cum; var sw=pct*360; cum+=sw; paths+='<path d="'+arc(sa,sw)+'" fill="'+d.color+'" data-act="homeDrill" data-arg="'+d.id+'" style="cursor:pointer"></path>'; });
  var legend = hasData.map(function(d){ var pct=Math.round((d.total/grand)*100); return '<div data-act="homeDrill" data-arg="'+d.id+'" style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;cursor:pointer;background:#FAFAF8;border:1px solid #F0EDE8"><div style="width:10px;height:10px;border-radius:3px;background:'+d.color+';flex-shrink:0"></div><span style="font-size:13px;font-weight:600">'+esc(d.label)+'</span><span style="font-size:12px;color:#8E8E93" class="tnum">'+fmt(d.total)+'</span><span style="font-size:11px;color:#B0ADA8">'+pct+'%</span></div>'; }).join('');
  return '<div><div style="display:flex;justify-content:center;margin-bottom:16px"><svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+paths+'<text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" style="font-size:18px;font-weight:800;fill:#1A1A1A">'+fmt(grand)+'</text><text x="'+cx+'" y="'+(cy+14)+'" text-anchor="middle" style="font-size:11px;fill:#8E8E93">總支出</text></svg></div><div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">'+legend+'</div></div>';
}

    iData.forEach(function(it,i){ var rc=gr(db.tree,it.path[0]); h += '<div data-act="qItemDrill" data-arg="'+it.path.join(",")+'" style="display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:'+(i<iData.length-1?'1px solid #F0EDE8':'none')+';cursor:pointer"><div style="width:36px;height:36px;border-radius:10px;background:'+(rc?rc.color:"#ccc")+'18;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">'+(rc?rc.icon:"📌")+'</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">'+esc(it.label)+'</div><div style="font-size:11px;color:var(--t2);margin-top:1px">'+esc(it.fullLabel.join(" › "))+'</div></div><div style="text-align:right;flex-shrink:0;margin-right:8px"><div style="font-size:15px;font-weight:700;color:var(--dg)">−'+fmt(it.total)+'</div><div style="font-size:12px;color:var(--ac);font-weight:600">'+it.totalQty+' 個 / '+it.count+' 筆</div></div><span style="font-size:13px;color:#C4C0BA;flex-shrink:0">›</span></div>'; });
  } else {
    // 成員模式
    var pmap={}; RECORDERS.forEach(function(r){ pmap[r.id]={id:r.id,label:r.label,color:r.color,count:0,total:0}; });
    var unassigned={id:"",label:"未指定",color:"#8E8E93",count:0,total:0};
    qEntries.forEach(function(e){ var rid=e.recorder||""; if(pmap[rid]){ pmap[rid].count++; pmap[rid].total+=e.amount; } else { unassigned.count++; unassigned.total+=e.amount; } });
    var pData = RECORDERS.map(function(r){ return pmap[r.id]; });
    if(unassigned.count>0) pData.push(unassigned);
    pData = pData.filter(function(p){ return p.count>0; }).sort(function(a,b){ return b.total-a.total; });
    var grand = pData.reduce(function(s,p){ return s+p.total; },0);
    if(pData.length===0){ h += '<div style="text-align:center;color:var(--t2);padding:30px">此區間無紀錄</div>'; }
    else {
      pData.forEach(function(p,i){ var pct = grand>0?Math.round(p.total/grand*100):0; h += '<div data-act="qMemberDrill" data-arg="'+p.id+'" style="display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:'+(i<pData.length-1?'1px solid #F0EDE8':'none')+';cursor:pointer"><div style="width:40px;height:40px;border-radius:50%;background:'+p.color+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0">'+esc(p.label)+'</div><div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:600">'+esc(p.label)+'</div><div style="height:6px;background:#F0EDE8;border-radius:3px;margin-top:6px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+p.color+';border-radius:3px"></div></div></div><div style="text-align:right;flex-shrink:0;margin-right:8px"><div style="font-size:15px;font-weight:700;color:var(--dg)">−'+fmt(p.total)+'</div><div style="font-size:11px;color:var(--t2)">'+p.count+' 筆 · '+pct+'%</div></div><span style="font-size:13px;color:#C4C0BA;flex-shrink:0">›</span></div>'; });
    }
  }
  h += '</div></div>';
  return h;
}

function navHTML(){
  var tabs = [{k:"home",i:"🏠",l:"總覽"},{k:"add",i:"➕",l:"記帳"},{k:"quick",i:"⚡",l:"快速"},{k:"query",i:"🔍",l:"查詢"},{k:"list",i:"📋",l:"明細"},{k:"settings",i:"⚙️",l:"設定"}];

function render(){
  var y = window.scrollY;
  var h = '';
  if(ui.toast) h += '<div class="toast">'+esc(ui.toast)+'</div>';
  h += syncBarHTML();
  if(ui.view==="home") h += homeHTML();
  else if(ui.view==="add") h += addHTML();
  else if(ui.view==="edit") h += editHTML();
  else if(ui.view==="list") h += listHTML();
  else if(ui.view==="quick") h += quickHTML();
  else if(ui.view==="query") h += queryHTML();
  else if(ui.view==="settings") h += settingsHTML();
  h += navHTML();
  if(ui.phraseModal) h += phraseModalHTML();

/* ═══════════ 事件 ═══════════ */
function resetAdd(){ ui.navPath=[]; ui.selItem=null; ui.addVeg=false; ui.amt=""; ui.qty=1; ui.note=""; ui.recip=""; ui.showNew=false; ui.newName=""; }

function drillInto(cid){
  var np = ui.navPath.concat([cid]);
  var node = fn(db.tree, np);
  if(node && node.children && node.children.length>0){ ui.navPath=np; ui.showNew=false; }
  else { ui.navPath=np; ui.selItem=node; ui.amt=getLP(np); ui.qty=1; ui.showNew=false; }
}
function addBack(){
  ui.showNew=false; ui.newName="";
  if(ui.selItem){ var node=fn(db.tree,ui.navPath); ui.selItem=null; ui.addVeg=false; ui.amt=""; ui.qty=1; ui.note=""; ui.recip=""; if(node&&(!node.children||node.children.length===0)) ui.navPath=ui.navPath.slice(0,-1); }
  else if(ui.navPath.length>0){ ui.navPath=ui.navPath.slice(0,-1); }
  else { ui.view="home"; }
}

app.addEventListener('click', function(ev){
  var el = ev.target.closest('[data-act]'); if(!el) return;
  var act = el.dataset.act, arg = el.dataset.arg;
  switch(act){
    case 'tab': ui.view=arg; render(); break;
    case 'goAdd': resetAdd(); ui.view="add"; render(); break;
    case 'setRecorder': db.recorder=arg; saveDB(); render(); break;
    case 'editSetRecorder': ui.editRecorder=arg; render(); break;
    case 'listFilterToggle': { var idx=ui.listFilter.indexOf(arg); if(idx===-1) ui.listFilter=ui.listFilter.concat([arg]); else ui.listFilter=ui.listFilter.filter(function(x){ return x!==arg; }); render(); break; }
    case 'listFilterClear': ui.listFilter=[]; render(); break;

    // 雲端同步
    case 'phraseSet': ui.phraseModal={value:db.sync.passphrase||'',error:''}; render(); break;
    case 'phraseCancel': ui.phraseModal=null; render(); break;
    case 'phraseSave': {
      var inp=document.getElementById('phraseInput'); var v=(inp&&inp.value||'').trim();
      if(v.length<4){ ui.phraseModal.error='密語至少 4 個字'; render(); break; }
      db.sync.passphrase=v; cryptoKey=null; cryptoKeyPhrase=null; saveDB(); ui.phraseModal=null; render(); enableSync(); break;
    }
    case 'syncOff': db.sync.enabled=false; saveDB(); stopSync(); render(); break;
    case 'syncPushAll': { if(sync.state!=='on'&&sync.state!=='connecting') enableSync(); pushAll().then(function(){ showToast('已重新上傳'); }); break; }

    // home drill
    case 'homeDrill': ui.homeDrill=arg; ui.homeDrillMonth=null; render(); break;
    case 'homeDrillClear': ui.homeDrill=null; render(); break;
    case 'homeDrillMonth': ui.homeDrillMonth=parseInt(arg,10); render(); break;
    case 'homeDrillMonthClear': ui.homeDrillMonth=null; render(); break;

    // add flow
    case 'addBack': addBack(); render(); break;
    case 'topCat': { var cat=gr(db.tree,arg); if(cat.children&&cat.children.length===0){ ui.navPath=[cat.id]; ui.selItem=cat; ui.amt=getLP([cat.id]); ui.qty=1; } else { drillInto(cat.id); } render(); break; }
    case 'drill': drillInto(arg); render(); break;
    case 'showNew': ui.showNew=true; render(); break;
    case 'newType': ui.newType=arg; render(); break;
    case 'newCancel': ui.showNew=false; ui.newName=""; render(); break;
    case 'newConfirm': {
      var name=(ui.newName||'').trim();
      var curNode = ui.navPath.length>0?fn(db.tree,ui.navPath):null;
      var curChildren = ui.navPath.length===0?db.tree:(curNode?(curNode.children||[]):[]);
      if(!name){ showToast("請輸入名稱"); break; }
      if(curChildren.some(function(c){ return c.label===name; })){ showToast("此名稱已存在"); break; }
      var nn={id:"custom_"+Date.now(),label:name,createdAt:TODAY};
      if(ui.newType==="store") nn.isStore=true;
      db.tree = addNode(db.tree, ui.navPath, nn); saveDB();
      ui.newName=""; ui.showNew=false; showToast("已新增「"+name+"」"); render(); break;
    }
    case 'toggleVeg': ui.addVeg=!ui.addVeg; render(); break;
    case 'qtyMinus': ui.qty=Math.max(1,ui.qty-1); render(); break;
    case 'qtyPlus': ui.qty=ui.qty+1; render(); break;
    case 'saveAdd': {
      var uP=Number(ui.amt)||0;
      if(!ui.amt||isNaN(Number(ui.amt))||uP<=0){ showToast("請輸入有效金額"); break; }
      var labels=bl(db.tree,ui.navPath);
      var fNote=ui.note||labels[labels.length-1];
      if(ui.addVeg) fNote+="（加菜）";
      if(ui.qty>1) fNote+=" ×"+ui.qty;
      if(ui.recip) fNote+="（"+ui.recip+"）";
      var entry={id:Date.now(),path:ui.navPath.slice(),unitPrice:uP,qty:ui.qty,amount:uP*ui.qty,note:fNote,addVeg:ui.addVeg,recipient:ui.recip||undefined,recorder:db.recorder,date:new Date().toISOString().slice(0,10),updatedAt:Date.now()};
      db.entries.unshift(entry); saveDB(); pushEntry(entry);
      showToast("已新增！"); resetAdd(); ui.view="home"; render(); break;
    }

    // edit
    case 'startEdit': { var e=null; for(var i=0;i<db.entries.length;i++){ if(String(db.entries[i].id)===arg){ e=db.entries[i]; break; } } if(!e) break; ui.editEntry=JSON.parse(JSON.stringify(e)); ui.editAmt=String(e.unitPrice); ui.editQty=e.qty||1; ui.editNote=e.note; ui.editDate=e.date; ui.editRecorder=recById(e.recorder)?e.recorder:"wei"; ui.view="edit"; render(); break; }
    case 'editClose': ui.editEntry=null; ui.view="home"; render(); break;
    case 'editQtyMinus': ui.editQty=Math.max(1,ui.editQty-1); render(); break;
    case 'editQtyPlus': ui.editQty=ui.editQty+1; render(); break;
    case 'editSaveBtn': {
      var p=Number(ui.editAmt);
      if(!p||p<=0){ showToast("請輸入有效金額"); break; }
      var newAt = Date.now();
      var updated=null;
      db.entries = db.entries.map(function(x){ if(x.id===ui.editEntry.id){ updated=m(x,{unitPrice:p,qty:ui.editQty,amount:p*ui.editQty,note:ui.editNote,date:ui.editDate,recorder:ui.editRecorder,updatedAt:newAt}); return updated; } return x; }); saveDB();
      if(updated) pushEntry(updated);
      showToast("已更新！"); ui.editEntry=null; ui.view="home"; render(); break;
    }
    case 'editDelete': { var delId=ui.editEntry.id; db.entries=db.entries.filter(function(x){ return x.id!==delId; }); saveDB(); pushDelete(delId); showToast("已刪除"); ui.editEntry=null; ui.view="home"; render(); break; }

    // quick / cart
    case 'openStore': { var treeStores=cStores(db.tree,[]); var store; if(arg==="pxmart") store=PXMART; else { var found=null; for(var i=0;i<treeStores.length;i++){ if(treeStores[i].id===arg){ found=treeStores[i]; break; } } var node=found?fn(db.tree,found.treePath):null; store=(found&&node)?buildQS(db.tree,found.treePath,node,db.entries):null; } if(store){ ui.qStore=store; ui.cart=[]; ui.cashPaid=""; } render(); break; }
    case 'closeStore': { if(ui.cart.length>0 && !confirm("購物車尚有品項，確定離開？")) break; ui.qStore=null; ui.cart=[]; ui.cashPaid=""; render(); break; }
    case 'removeStore': { db.qsIds=db.qsIds.filter(function(id){ return id!==arg; }); saveDB(); showToast("已移除"); render(); break; }
    case 'showPick': ui.showPick=true; render(); break;
    case 'hidePick': ui.showPick=false; render(); break;
    case 'addStore': { db.qsIds=db.qsIds.concat([arg]); saveDB(); ui.showPick=false; showToast("已新增"); render(); break; }
    case 'addCart': {
      var price=Number(el.dataset.price)||0;
      var idx=-1; for(var i=0;i<ui.cart.length;i++){ if(ui.cart[i].id===arg){ idx=i; break; } }
      if(idx>=0){ ui.cart[idx].qty++; }
      else {
        // find item def from current store
        var itemDef=null;
        ui.qStore.sections.forEach(function(sec){ sec.items.forEach(function(it){ if(it.id===arg) itemDef=it; }); });
        if(itemDef){ ui.cart.push(m(itemDef,{price:price,qty:1})); }
      }
      render(); break;
    }
    case 'cartMinus': { var i2=parseInt(arg,10); ui.cart[i2].qty=Math.max(0,ui.cart[i2].qty-1); ui.cart=ui.cart.filter(function(c){ return c.qty>0; }); render(); break; }
    case 'cartPlus': { var i3=parseInt(arg,10); ui.cart[i3].qty++; render(); break; }
    case 'cartVeg': { var i4=parseInt(arg,10); ui.cart[i4].addVeg=!ui.cart[i4].addVeg; render(); break; }
    case 'editCartPrice': { ui.editCartIdx=parseInt(arg,10); ui.editCartP=String(ui.cart[ui.editCartIdx].price); render(); break; }
    case 'saveCart': {
      if(ui.cart.length===0){ showToast("購物車是空的"); break; }
      var now=new Date().toISOString().slice(0,10);
      var total=ui.cart.reduce(function(s,c){ return s+c.price*c.qty; },0);
      var count=ui.cart.reduce(function(s,c){ return s+c.qty; },0);
      var ne=ui.cart.map(function(c,i){ var n=c.label; if(c.addVeg) n+="（加菜）"; if(c.qty>1) n+=" ×"+c.qty; return {id:Date.now()+i,path:c.path,unitPrice:c.price,qty:c.qty,amount:c.price*c.qty,note:n,addVeg:c.addVeg||false,recorder:db.recorder,date:now,updatedAt:Date.now()+i}; });
      db.entries = ne.reverse().concat(db.entries); saveDB();
      ne.forEach(function(x){ pushEntry(x); });
      showToast("已記帳 "+count+" 項，共 "+fmt(total));
      ui.cart=[]; ui.qStore=null; ui.cashPaid=""; ui.view="home"; render(); break;
    }

    // query
    case 'qMode': ui.qMode=arg; ui.qDrill=null; ui.qItemDrill=null; ui.qMemberDrill=null; render(); break;
    case 'qMemberDrill': ui.qMemberDrill=arg; render(); break;
    case 'qMemberDrillClear': ui.qMemberDrill=null; render(); break;
    case 'qDrillCat': ui.qDrill=[arg]; render(); break;
    case 'qDrillStore': ui.qDrill=arg.split(","); render(); break;
    case 'qDrillInto': ui.qDrill=ui.qDrill.concat([arg]); render(); break;
    case 'qDrillBack': { if(ui.qDrill.length<=1) ui.qDrill=null; else ui.qDrill=ui.qDrill.slice(0,-1); render(); break; }
    case 'qItemDrill': ui.qItemDrill=arg.split(","); render(); break;
    case 'qItemDrillClear': ui.qItemDrill=null; render(); break;
  }
});

  var v = ev.target.value;
  if(b==="amt") ui.amt=v;
  else if(b==="note") ui.note=v;
  else if(b==="recip") ui.recip=v;
  else if(b==="newName") ui.newName=v;
  else if(b==="editAmt") ui.editAmt=v;
  else if(b==="editNote") ui.editNote=v;
  else if(b==="editDate") ui.editDate=v;
  else if(b==="cashPaid") ui.cashPaid=v;

  else if(b==="qTo"){ ui.qTo=v; ui.qDrill=null; ui.qItemDrill=null; ui.qMemberDrill=null; render(); }
});

// commit cart price edit on blur / enter
app.addEventListener('blur', function(ev){
  var b = ev.target.dataset && ev.target.dataset.bind;
  if(b==="editCartP"){
    var idx = parseInt(ev.target.dataset.cartidx,10);
    var p = Number(ui.editCartP);
    if(p>0 && ui.cart[idx]) ui.cart[idx].price=p;
    ui.editCartIdx=null; render();
  }
}, true);
app.addEventListener('keydown', function(ev){
  if(ev.key==="Enter" && ev.target.dataset && ev.target.dataset.bind==="editCartP"){ ev.target.blur(); }
});

/* ═══════════ 啟動 ═══════════ */
loadDB();
// 執行一次自動清理（100 天未使用的自訂/系統項目）
db.tree = cleanT(db.tree, db.entries, TODAY); saveDB();
render();
if(db.sync.enabled && db.sync.passphrase && fbConfigValid()){
  var tryStart = function(n){ if(typeof firebase!=='undefined'){ if(initFirebase()) startListening(); } else if(n<40) setTimeout(function(){ tryStart(n+1); },100); }; tryStart(0);
}
window.addEventListener('online', function(){ if(db.sync.enabled && sync.pending) pushAll(); if(db.sync.enabled && sync.state==='error') startListening(); });
</script>
</body>
</html>
