/* ============================================================
   Kuromi 寶寶照護日誌 - 深色系UI
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;600;700&family=Cormorant+Garamond:wght@600;700&family=Pacifico&display=swap');

:root {
  --bg: #1a1525;
  --bg-grad: #2a1f3d;
  --card: #26203a;
  --card-soft: rgba(58, 47, 86, 0.6);
  --border: rgba(186, 142, 217, 0.25);
  --accent: #ff4d8d;
  --accent-dark: #d63a73;
  --pink: #ff8fb8;
  --lavender: #b89ad9;
  --text: #f5e9ff;
  --text-dim: #9d8bb8;
  --text-soft: #c8b3e0;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  background: radial-gradient(ellipse at top, var(--bg-grad) 0%, var(--bg) 70%);
  color: var(--text);
  font-family: 'Noto Sans TC', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  font-size: 15px; line-height: 1.5;
  overscroll-behavior-y: none;
}

.serif { font-family: "Noto Serif TC", serif; }
.num { font-family: "Cormorant Garamond", serif; font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }
.display { font-family: "Pacifico", cursive; }

button { background: none; border: none; color: inherit; cursor: pointer; font-family: inherit; font-size: inherit; }
input, textarea { font-family: inherit; color: var(--text); outline: none; background: transparent; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(186,142,217,0.3); border-radius: 3px; }

#app { max-width: 520px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 110px; }

/* Animations */
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes toast { 0% { opacity:0; transform:translate(-50%,-10px); } 15%, 85% { opacity:1; transform:translate(-50%,0); } 100% { opacity:0; transform:translate(-50%,-5px); } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
@keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

.anim-slide { animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
.anim-fade { animation: fadeIn 0.2s ease; }
.anim-toast { animation: toast 2s ease forwards; }
.anim-float { animation: float 2.5s ease-in-out infinite; }
.star { animation: twinkle 2s ease-in-out infinite; position: absolute; }

/* Utilities */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
.card-soft { background: var(--card-soft); border: 1px solid var(--border); backdrop-filter: blur(8px); border-radius: 16px; }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; font-weight: 600; border-radius: 16px; box-shadow: 0 6px 18px rgba(255,77,141,0.35); padding: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.1s; }
.btn-primary:active { transform: scale(0.98); }
.btn-outline { background: rgba(186,142,217,0.1); border: 1px solid var(--border); color: var(--text-soft); font-weight: 500; border-radius: 12px; padding: 12px; text-align: center; }
.divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(186,142,217,0.3), transparent); margin: 0 20px 20px; }

/* Header & Tabs */
.tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, transparent 0%, rgba(26,21,37,0.95) 30%, #1a1525 100%); z-index: 20; padding-bottom: env(safe-area-inset-bottom); }
.tabbar-in { max-width: 520px; margin: 0 auto; padding: 12px; }
.tab-container { background: rgba(38, 32, 58, 0.85); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 24px; display: flex; padding: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05) inset; }
.tab-btn { flex: 1; padding: 10px 0; border-radius: 16px; display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--text-dim); transition: 0.2s; }
.tab-btn.on { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; box-shadow: 0 4px 14px rgba(255,77,141,0.3); }

/* Modal */
.modal-bg { position: fixed; inset: 0; z-index: 30; background: rgba(10, 5, 25, 0.7); backdrop-filter: blur(4px); }
.modal-panel { position: absolute; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); max-height: 92vh; overflow-y: auto; }
@media (min-width: 520px) {
  .modal-panel { bottom: auto; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 440px; }
}
.toast { position: fixed; top: 80px; left: 50%; z-index: 50; background: var(--accent); color: #fff; padding: 8px 16px; border-radius: 99px; font-weight: 500; font-size: 14px; box-shadow: 0 8px 20px rgba(255,77,141,0.4); display: flex; align-items: center; gap: 6px; transform: translateX(-50%); }

/* Sync Bar */
.syncbar { position: sticky; top: 0; z-index: 10; display: flex; justify-content: center; align-items: center; gap: 6px; padding: 6px; font-size: 11px; letter-spacing: 0.1em; background: rgba(38,32,58,0.9); backdrop-filter: blur(4px); border-bottom: 1px solid var(--border); color: var(--lavender); }
.syncdot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex: none; }
.syncdot.on { background: #5fbf7f; }
.syncdot.err { background: var(--accent); }
.syncdot.sync { background: #f0b429; animation: pulse 1s infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1) hue-rotate(280deg); opacity: 0.7; }
</style>
</head>

var pad2 = function(n) { return String(n).padStart(2,'0'); };
var iso = function(d) { return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()); };

function formatDate(dateStr) {
  var parts = dateStr.split('-');
  var y = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10);
  var d = parseInt(parts[2], 10);
  var dt = new Date(y, m-1, d);
  var days = ['日','一','二','三','四','五','六'];
  return { full: y + '/' + m + '/' + d, day: '週' + days[dt.getDay()], short: m + '/' + d };
}

/* ============================================================
   Data & Crypto
   ============================================================ */
var KEY = 'kuromi-baby-log';
function normalize(d) {
  return {
    babyName: (d && d.babyName) || '妹妹',
    entries: Array.isArray(d && d.entries) ? d.entries : [],
    sync: {
      passphrase: (d && d.sync && d.sync.passphrase) || null,
      enabled: !!(d && d.sync && d.sync.enabled)
    }
  };
}
var db = normalize(null);
try { var raw = localStorage.getItem(KEY); if(raw) db = normalize(JSON.parse(raw)); } catch(e){}
function save() { try { localStorage.setItem(KEY, JSON.stringify(db)); } catch(e){} }

var enc = new TextEncoder(); var dec = new TextDecoder();
var cryptoKey = null; var cryptoKeyPhrase = null;
var FIXED_SALT = enc.encode('kuromi-baby-fixed-salt-2026');

function bufToB64(buf){ var bytes = new Uint8Array(buf); var s = ''; for(var i=0;i<bytes.length;i++) s += String.fromCharCode(bytes[i]); return btoa(s); }
function b64ToBuf(b64){ var s = atob(b64); var bytes = new Uint8Array(s.length); for(var i=0;i<s.length;i++) bytes[i] = s.charCodeAt(i); return bytes.buffer; }

async function deriveKey(passphrase){
  if(cryptoKey && cryptoKeyPhrase === passphrase) return cryptoKey;
  var baseKey = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  cryptoKey = await crypto.subtle.deriveKey({ name:'PBKDF2', salt:FIXED_SALT, iterations:100000, hash:'SHA-256' }, baseKey, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
  cryptoKeyPhrase = passphrase; return cryptoKey;
}
async function encryptObj(obj, passphrase){
  var key = await deriveKey(passphrase); var iv = crypto.getRandomValues(new Uint8Array(12));
  var data = enc.encode(JSON.stringify(obj));
  var ct = await crypto.subtle.encrypt({name:'AES-GCM', iv: iv}, key, data);
  return { iv: bufToB64(iv), ct: bufToB64(ct) };
}
async function decryptObj(payload, passphrase){
  var key = await deriveKey(passphrase); var iv = new Uint8Array(b64ToBuf(payload.iv));
  var pt = await crypto.subtle.decrypt({name:'AES-GCM', iv: iv}, key, b64ToBuf(payload.ct));
  return JSON.parse(dec.decode(pt));
}

/* ============================================================
   Firebase Sync Engine
   ============================================================ */
var sync = { fb: null, dbRef: null, unsub: null, state: 'off', lastError: '', pending: false };
function fbConfigValid(){ return FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes('貼上'); }

function initFirebase(){
  if(sync.fb) return true;
  if(!fbConfigValid() || typeof firebase === 'undefined') return false;
  try{
    sync.fb = firebase.initializeApp(FIREBASE_CONFIG);
    var fs = firebase.firestore();
    try{ fs.enablePersistence({synchronizeTabs:true}).catch(function(){}); }catch(e){}
    sync.dbRef = fs.collection('baby_records'); return true;
  }catch(e){ sync.lastError = e.message; sync.state = 'error'; return false; }
}

async function pushRecord(item){
  if(!sync.dbRef || !db.sync.passphrase) return;
  try{
    var payload = await encryptObj(item, db.sync.passphrase);
    await sync.dbRef.doc(item.id).set({ iv: payload.iv, ct: payload.ct, updatedAt: item.updatedAt || Date.now() });
    if(sync.pending){ sync.pending = false; renderSyncBar(); }
  }catch(e){ sync.pending = true; renderSyncBar(); }
}
async function pushAll(){
  if(!sync.dbRef || !db.sync.passphrase) return;
  for(var i=0; i<db.entries.length; i++){
    await pushRecord(db.entries[i]);
  }
}

function startListening(){
  if(!sync.dbRef || !db.sync.passphrase){ sync.state='nokey'; renderSyncBar(); return; }
  if(sync.unsub) sync.unsub();
  sync.state = 'connecting'; renderSyncBar();
  sync.unsub = sync.dbRef.onSnapshot(async function(snap){
    var changed = false;
    for(var i=0; i<snap.docs.length; i++){
      var d = snap.docs[i].data(); if(!d || !d.ct) continue;
      try{ 
        var item = await decryptObj({iv:d.iv, ct:d.ct}, db.sync.passphrase); 
        changed = mergeRecord(item) || changed;
      }catch(e){ continue; }
    }
    sync.state = 'on'; 
    if(changed){ save(); render(); } else renderSyncBar();
  }, function(err){ sync.state = 'error'; sync.lastError = err.message; renderSyncBar(); });
}

function mergeRecord(remote){
  var idx = db.entries.findIndex(function(x){ return x.id === remote.id; });
  if(idx === -1){ if(remote.deleted) return false; db.entries.push(remote); return true; }
  var local = db.entries[idx];
  if((remote.updatedAt || 0) > (local.updatedAt || 0)){
    if(remote.deleted){ db.entries.splice(idx, 1); return true; }
    db.entries[idx] = remote; return true;
  }
  return false;
}
async function enableSync(){
  if(!db.sync.passphrase){ sync.state = 'nokey'; renderSyncBar(); return; }
  if(!initFirebase()){ if(sync.state !== 'error') sync.state = 'error'; renderSyncBar(); return; }
  db.sync.enabled = true; save(); startListening(); await pushAll();
}
function stopSync(){
  if(sync.unsub){ sync.unsub(); sync.unsub = null; }
  sync.state = 'off'; renderSyncBar();
}

  return '';

          <div style="display:flex; flex-direction:column; align-items:center; padding-top:20px; width:2px">

            <div style="flex:1; width:1px; background:var(--border); margin:4px 0 12px"></div>
          </div>
          <div style="flex:1; padding:8px 12px">${items}</div>
        </div>
      </div>`;
    }).join('') + `</div>`;
  }
  h += `</div>
    <div style="position:fixed; bottom:120px; left:0; right:0; z-index:10; padding:0 20px; pointer-events:none">
      <button data-act="openWizard" class="btn-primary" style="pointer-events:auto; width:100%; max-width:480px; margin:0 auto">
        ${icon('Sparkles', 18)} 新增記錄 ${icon('Sparkles', 18)}

  return h;
}

/* ---------- History View ---------- */
function historyHTML() {
  var allDates = db.entries.filter(function(e){ return !e.deleted; }).map(function(e){ return e.date; });
  var uniqueDates = [];
  for(var i=0; i<allDates.length; i++) {
    if(uniqueDates.indexOf(allDates[i]) === -1) uniqueDates.push(allDates[i]);
  }
  var dates = uniqueDates.sort().reverse();
  
  var h = `<div style="padding: 40px 20px 16px; position:relative; z-index:10">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px">
      ${icon('Calendar', 14, 'var(--lavender)')}
      <span class="display" style="color:var(--pink); font-size:16px; letter-spacing:0.05em">過往記錄</span>
      ${iconFill('Star', 11, 'var(--accent)')}
    </div>
    <div class="serif" style="font-size:30px; font-weight:700; margin-top:8px">所有的日子</div>
    <div style="font-size:14px; color:var(--text-dim); margin-top:4px">${esc(db.babyName)}的成長軌跡 ✦</div>
  </div>
  <div class="divider"></div>
  <div style="padding: 0 20px; position:relative; z-index:10">`;

  if(dates.length === 0){
    h += `<div style="text-align:center; padding: 80px 24px">
      <div class="anim-float" style="margin-bottom:16px; display:inline-block">${icon('Moon', 42, 'var(--lavender)')}</div>
      <div class="serif" style="font-size:20px; color:var(--text-soft); margin-bottom:8px">還沒有歷史</div>
      <div style="font-size:14px; color:var(--text-dim)">從第一筆開始 ⭐</div>
    </div>`;
  } else {
    var totalMilk = 0, totalEntries = 0;
    var daysData = dates.map(function(d){
      var entries = db.entries.filter(function(e){ return e.date === d && !e.deleted; });
      var counts = { feed_milk:0, feed_solid:0, pee:0, poop:0, temp:0, note:0 };
      var dayMilk = 0;
      for(var i=0; i<entries.length; i++){
        var e = entries[i];
        if(e.type==='feed'){ if(e.solid) counts.feed_solid++; else counts.feed_milk++; if(e.milk) dayMilk += +e.milk; }
        else counts[e.type] = (counts[e.type]||0)+1;
      }
      totalMilk += dayMilk; totalEntries += entries.length;
      return { date: d, counts: counts, dayMilk: dayMilk, total: entries.length };
    });

    h += `<div class="card-soft" style="margin-bottom:20px; padding:16px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px">
      <div style="text-align:center"><div class="num" style="font-size:24px; font-weight:700; line-height:1.1">${dates.length}</div><div style="font-size:12px; color:var(--text-dim); margin-top:4px; letter-spacing:0.1em">天數</div></div>
      <div style="text-align:center"><div class="num" style="font-size:24px; font-weight:700; line-height:1.1">${totalEntries}</div><div style="font-size:12px; color:var(--text-dim); margin-top:4px; letter-spacing:0.1em">總筆數</div></div>
      <div style="text-align:center"><div class="num" style="font-size:18px; font-weight:700; line-height:1.1; margin-top:4px">${totalMilk}cc</div><div style="font-size:12px; color:var(--text-dim); margin-top:6px; letter-spacing:0.1em">奶量總計</div></div>
    </div><div style="display:flex; flex-direction:column; gap:8px">`;

    for(var i=0; i<daysData.length; i++){
      var day = daysData[i];
      var dInfo = formatDate(day.date);
      var isCur = day.date === ui.date;
      var isTdy = day.date === todayStr();
      var statItems = [ { k:'feed_milk', l:'奶量', c:ENTRY_TYPES.feed.color }, { k:'feed_solid', l:'米量', c:ENTRY_TYPES.feed.color }, { k:'pee', l:'排尿', c:ENTRY_TYPES.pee.color }, { k:'poop', l:'排便', c:ENTRY_TYPES.poop.color }, { k:'temp', l:'體溫', c:ENTRY_TYPES.temp.color }, { k:'note', l:'備註', c:ENTRY_TYPES.note.color } ]
        .map(function(item){ return day.counts[item.k] > 0 ? `<span style="display:flex; align-items:center; gap:4px; color:var(--text-soft)"><span style="width:6px;height:6px;border-radius:50%;background:${item.c}"></span><span>${item.l}</span><span class="num" style="font-weight:700; color:var(--text)">${day.counts[item.k]}</span></span>` : ''; }).join('');

      h += `<button data-act="pickDate" data-arg="${day.date}" class="card" style="width:100%; text-align:left; padding:16px; background:${isCur ? 'linear-gradient(135deg, rgba(255,77,141,0.13), rgba(255,77,141,0.05))' : 'var(--card)'}; border-color:${isCur ? 'rgba(255,77,141,0.4)' : 'var(--border)'}">
        <div style="display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px">
          <div style="display:flex; align-items:baseline; gap:8px">
            <div class="num" style="font-size:18px; font-weight:700; letter-spacing:-0.01em">${dInfo.full}</div>
            <div class="serif" style="font-size:14px; color:var(--text-dim)">${dInfo.day}</div>
          </div>
          <div style="display:flex; gap:6px">
            ${isTdy ? `<span style="background:var(--accent); color:#fff; padding:2px 8px; border-radius:99px; font-size:10px; font-weight:600; letter-spacing:0.1em">TODAY</span>` : ''}
            ${isCur&&!isTdy ? `<span style="background:rgba(255,77,141,0.13); color:var(--pink); padding:2px 8px; border-radius:99px; font-size:10px; letter-spacing:0.1em">選取中</span>` : ''}
          </div>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:12px; font-size:12px">${statItems}</div>
        ${day.dayMilk > 0 ? `<div style="margin-top:8px; padding-top:8px; border-top:1px dashed var(--border); font-size:12px; color:var(--text-dim); display:flex; gap:6px; align-items:center"><span>當日奶量</span><span class="num" style="font-weight:700; color:var(--pink)">${day.dayMilk}cc</span></div>` : ''}
      </button>`;
    }
    h += `</div>`;
  }
  return h + `</div>`;
}

/* ---------- Settings View ---------- */

  </div>
  <div class="divider"></div>

      <div style="position:sticky; top:0; z-index:10; background:var(--card); border-bottom:1px solid var(--border); padding:16px 20px 12px; border-radius:24px 24px 0 0">
        <div style="display:flex; justify-content:space-between; align-items:center">
          <button data-act="wizBack" style="padding:6px; margin-left:-6px">${icon('ChevronLeft', 22, 'var(--text-soft)')}</button>
          <div style="display:flex; gap:6px">
            ${[1,2,3].map(function(s){ return `<div style="width:${ui.step===s?'20px':'6px'}; height:6px; border-radius:3px; background:${ui.step>=s?'var(--accent)':'rgba(186,142,217,0.3)'}; transition:0.3s"></div>`; }).join('')}
          </div>
          <button data-act="wizClose" style="padding:6px; margin-right:-6px">${icon('X', 22, 'var(--text-soft)')}</button>
        </div>
      </div>
      <div style="padding: 8px 20px 32px">${content}</div>
    </div>
  </div>`;
}

function editModalHTML() {
  var e = ui.editing; var type = ENTRY_TYPES[e.type];
  var sum = ''; if(e.type==='feed') sum = [e.solid, e.milk?e.milk+'cc':''].filter(Boolean).join(' · ');
  return `<div class="modal-bg" data-act="editClose"><div class="modal-panel anim-slide" style="padding:20px" data-stop="1">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px">
      <div style="display:flex; gap:12px; align-items:center">
        <div style="width:44px; height:44px; border-radius:16px; background:${type.bg}; border:1px solid ${type.border}; display:flex; justify-content:center; align-items:center">
          ${type.icon ? icon(type.icon, 22, type.color) : `<span style="color:${type.color}; font-size:20px; font-weight:800">${type.emoji}</span>`}
        </div>
        <div><div style="font-size:12px; color:var(--text-dim); letter-spacing:0.2em">EDIT</div><div class="serif" style="font-size:24px; font-weight:700">${type.label}</div>${sum?`<div style="font-size:14px; color:var(--text-soft); font-weight:500">${sum}</div>`:''}</div>
      </div>
      <button data-act="editClose" style="padding:8px; margin:-8px">${icon('X', 22, 'var(--text-soft)')}</button>
    </div>
    
    <div style="margin-bottom:16px"><div style="font-size:11px; color:var(--text-dim); letter-spacing:0.15em; margin-bottom:8px">時間</div><input type="time" value="${e.time}" data-bind="editTime" class="num" style="width:100%; padding:12px 16px; border-radius:12px; background:var(--bg); border:1px solid var(--border); font-size:16px"></div>
    <div style="margin-bottom:16px"><div style="font-size:11px; color:var(--text-dim); letter-spacing:0.15em; margin-bottom:8px">記錄者</div><div style="display:flex; gap:8px">${RECORDERS.map(function(rr){ return `<button data-act="editRec" data-arg="${rr.id}" style="flex:1; padding:10px; border-radius:12px; font-size:14px; border:${e.recorder===rr.id?'none':'1px solid var(--border)'}; background:${e.recorder===rr.id?rr.color:'var(--bg)'}; color:${e.recorder===rr.id?'#fff':'var(--text-soft)'}; font-weight:${e.recorder===rr.id?600:500}">${rr.emoji} ${rr.label}</button>`; }).join('')}</div></div>
    
    ${e.type==='temp' ? `<div style="margin-bottom:16px"><div style="font-size:11px; color:var(--text-dim); letter-spacing:0.15em; margin-bottom:8px">體溫 (°C)</div><input type="number" step="0.1" inputMode="decimal" value="${e.value||''}" data-bind="editTemp" class="num" style="width:100%; padding:12px 16px; border-radius:12px; background:var(--bg); border:1px solid var(--border); font-size:16px"></div>` : ''}
    ${e.type==='note' ? `<div style="margin-bottom:16px"><div style="font-size:11px; color:var(--text-dim); letter-spacing:0.15em; margin-bottom:8px">內容</div><textarea rows="3" data-bind="editText" style="width:100%; padding:12px 16px; border-radius:12px; background:var(--bg); border:1px solid var(--border); font-size:16px; resize:none">${esc(e.text)}</textarea></div>` : ''}
    ${e.type!=='note' ? `<div style="margin-bottom:16px"><div style="font-size:11px; color:var(--text-dim); letter-spacing:0.15em; margin-bottom:8px">備註（選填）</div><textarea rows="2" data-bind="editNotes" placeholder="例：吐了一點" style="width:100%; padding:12px 16px; border-radius:12px; background:var(--bg); border:1px solid var(--border); font-size:16px; resize:none">${esc(e.notes)}</textarea></div>` : ''}

    <div style="display:flex; gap:8px; margin-top:8px">
      <button data-act="editDel" style="padding:14px 16px; border-radius:12px; background:rgba(184,90,90,0.1); border:1px solid rgba(184,90,90,0.3); color:#ff8a8a">${icon('Trash2',16)}</button>
      <button data-act="editClose" class="btn-outline" style="flex:1">取消</button>
      <button data-act="editSave" class="btn-primary" style="flex:1; background:${type.color}; box-shadow:0 4px 14px ${type.color}66; padding:14px">儲存</button>
    </div>
  </div></div>`;
}

function phraseModalHTML(){
  var m = ui.phraseModal;
  return `<div class="modal-bg" style="z-index:70; display:flex; align-items:center; justify-content:center; padding:28px"><div class="anim-slide card" style="width:100%; max-width:400px; padding:24px">
    <div class="serif" style="font-size:18px; font-weight:700; margin-bottom:8px">通關密語</div>
    <div style="font-size:13px; color:var(--text-dim); margin-bottom:16px; line-height:1.6">兩支手機要設「完全一樣」的密語才能互相解密。<br><b style="color:var(--pink)">忘記密語 = 雲端資料解不開</b>，請記牢。</div>
    <input type="text" id="phraseInput" value="${esc(m.value)}" placeholder="輸入通關密語……" style="width:100%; padding:12px 16px; border-radius:12px; background:var(--bg); border:1px solid var(--border); font-size:16px; margin-bottom:12px">
    ${m.error ? `<div style="color:var(--accent); font-size:12px; margin-bottom:12px">${esc(m.error)}</div>` : ''}
    <div style="display:flex; gap:8px"><button data-act="phraseCancel" class="btn-outline" style="flex:1">取消</button><button data-act="phraseSave" class="btn-primary" style="flex:1">儲存並同步</button></div>
  </div></div>`;
}

/* ============================================================
   Render & Events
   ============================================================ */
var app = document.getElementById('app');

function render(keepScroll){
  if(keepScroll === undefined) keepScroll = true;
  var y = window.scrollY;
  var h = bgStars();
  h += syncBarHTML();
  if(ui.tab === 'today') h += todayHTML();
  else if(ui.tab === 'history') h += historyHTML();
  else if(ui.tab === 'settings') h += settingsHTML();
  
  h += `<div class="tabbar"><div class="tabbar-in"><div class="tab-container">
    <button data-act="tab" data-arg="today" class="tab-btn ${ui.tab==='today'?'on':''}">${icon('Home',18)}<span style="font-size:12px; font-weight:${ui.tab==='today'?600:500}">今日</span></button>
    <button data-act="tab" data-arg="history" class="tab-btn ${ui.tab==='history'?'on':''}">${icon('Calendar',18)}<span style="font-size:12px; font-weight:${ui.tab==='history'?600:500}">過往</span></button>
    <button data-act="tab" data-arg="settings" class="tab-btn ${ui.tab==='settings'?'on':''}">${icon('Settings',18)}<span style="font-size:12px; font-weight:${ui.tab==='settings'?600:500}">設定</span></button>
  </div></div></div>`;

  if(ui.wizard) h += wizardHTML();
  if(ui.editing) h += editModalHTML();
  if(ui.phraseModal) h += phraseModalHTML();
  if(ui.toast) h += `<div class="toast anim-toast">${icon('Check',14,'#fff',2.5)}${ui.toast.text}</div>`;
  
  app.innerHTML = h;
  if(keepScroll) window.scrollTo(0, y);
}

/* Logic Helpers */
function logEntry(data, key){
  var id = Date.now().toString() + Math.random().toString(36).slice(2,6);
  var e = { id:id, createdAt: new Date().toISOString(), updatedAt: Date.now(), date: ui.date, time: ui.time, recorder: ui.recorder };
  for(var k in data) { e[k] = data[k]; }
  db.entries.push(e); save();
  if(sync.state==='on'||sync.state==='connecting') pushRecord(e);
  
  var sum = ENTRY_TYPES[data.type].label;
  if(data.type==='feed') sum = [data.solid, data.milk?data.milk+'cc':''].filter(Boolean).join(' · ');
  else if(data.type==='temp') sum = `${data.value}°C`;
  showToast(`${sum} 已記錄`);
  
  ui.subMode = null; ui.tempVal = ''; ui.noteVal = '';
  if(key) ui.pressedKeys[key] = id;
  render();
}
function undoEntry(key){
  var id = ui.pressedKeys[key]; if(!id) return;
  db.entries = db.entries.filter(function(e){ return e.id !== id; }); save();
  if(sync.state==='on'||sync.state==='connecting') pushRecord({id:id, deleted:true, updatedAt:Date.now()});
  delete ui.pressedKeys[key]; showToast('已取消'); render();
}

app.addEventListener('click', function(e) {
  var el = e.target.closest('[data-act]'); if(!el) return;
  var act = el.dataset.act, arg = el.dataset.arg;
  // The edit-modal backdrop carries data-act="editClose". A tap inside the
  // panel (which is marked data-stop) must NOT close the modal. Only close
  // when the tap resolves to the backdrop itself or an explicit close button.
  if(act === 'editClose' && el.classList.contains('modal-bg') && e.target.closest('[data-stop]')) return;
  
  switch(act){
    case 'tab': ui.tab = arg; render(false); break;
    case 'prevDay': { var d = new Date(ui.date.split('-')[0], parseInt(ui.date.split('-')[1])-1, ui.date.split('-')[2]); d.setDate(d.getDate()-1); ui.date = iso(d); render(false); break; }
    case 'nextDay': { var d = new Date(ui.date.split('-')[0], parseInt(ui.date.split('-')[1])-1, ui.date.split('-')[2]); d.setDate(d.getDate()+1); ui.date = iso(d); render(false); break; }
    case 'goToday': ui.date = todayStr(); render(false); break;
    case 'pickDate': ui.date = arg; ui.tab = 'today'; render(false); break;
    
    // Wizard
    case 'openWizard': ui.wizard = true; ui.step = 1; ui.time = nowTime(); ui.subMode = null; ui.pressedKeys = {}; render(false); break;
    case 'wizClose': ui.wizard = false; render(false); break;
    case 'wizBack': 
      if(ui.subMode) ui.subMode = null;
      else if(ui.step > 1) ui.step--; 
      else ui.wizard = false; 
      render(false); break;
    case 'wizRec': ui.recorder = arg; ui.step = 2; render(false); break;
    case 'wizNow': ui.time = nowTime(); render(false); break;
    case 'wizNext': ui.step = 3; render(false); break;
    case 'wizDone': ui.wizard = false; render(false); break;
    case 'wizLogFeed': logEntry({type:'feed', milk:el.dataset.milk, solid:el.dataset.solid}, el.dataset.key); break;
    case 'wizLog': logEntry({type:el.dataset.key, count:el.dataset.key==='poop'?1:undefined}, el.dataset.key); break;
    case 'wizSub': ui.subMode = el.dataset.key || arg; render(false); break;
    case 'wizLogSub': 
      if(arg==='temp') logEntry({type:'temp', value:ui.tempVal}, 'temp');
      else if(arg==='note') logEntry({type:'note', text:ui.noteVal.trim()}, 'note');
      break;
    case 'wizUndo': undoEntry(el.dataset.key || arg); break;
    
    // Edit
    case 'edit': ui.editing = JSON.parse(JSON.stringify(db.entries.find(function(x){ return x.id===arg; }))); render(false); break;
    case 'editClose': ui.editing = null; render(false); break;
    case 'editRec': ui.editing.recorder = arg; render(false); break;
    case 'editDel': 
      if(confirm('確定刪除這筆記錄？')){
        if(sync.state==='on'||sync.state==='connecting') pushRecord({id:ui.editing.id, deleted:true, updatedAt:Date.now()});
        db.entries = db.entries.filter(function(x){ return x.id !== ui.editing.id; }); save(); ui.editing = null; render();
      } break;
    case 'editSave':
      ui.editing.updatedAt = Date.now();
      for(var i=0; i<db.entries.length; i++){ if(db.entries[i].id === ui.editing.id) db.entries[i] = ui.editing; }
      save();
      if(sync.state==='on'||sync.state==='connecting') pushRecord(ui.editing);
      ui.editing = null; render(); break;
      
    // Sync & Settings
    case 'exportData': {
      var blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json'});
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${db.babyName}-照護記錄-${todayStr()}.json`;
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){ URL.revokeObjectURL(a.href); }, 3000);
      break;
    }
    case 'phraseSet': ui.phraseModal = { value: db.sync.passphrase || '', error: '' }; render(false); break;
    case 'phraseCancel': ui.phraseModal = null; render(false); break;
    case 'phraseSave': {
      var inp = document.getElementById('phraseInput'); var v = (inp && inp.value || '').trim();
      if(v.length < 4){ ui.phraseModal.error = '密語至少 4 個字'; render(false); break; }
      db.sync.passphrase = v; cryptoKey = null; cryptoKeyPhrase = null; save(); ui.phraseModal = null; render(false); enableSync(); break;
    }
    case 'syncOff': db.sync.enabled = false; save(); stopSync(); render(false); break;
    case 'syncPushAll': if(sync.state!=='on' && sync.state!=='connecting') enableSync(); pushAll().then(function(){ showToast('已重新上傳'); }); break;
  }
});

function toggleSubmit(sel, enabled){
  var btn = document.querySelector(sel);
  if(!btn) return;
  if(enabled){ btn.removeAttribute('disabled'); btn.style.opacity = ''; }
  else { btn.setAttribute('disabled', ''); btn.style.opacity = '0.4'; }
}

app.addEventListener('input', function(e) {
  var b = e.target.dataset && e.target.dataset.bind; if(!b) return;
  var v = e.target.value;
  if(b === 'babyName') { db.babyName = v || '妹妹'; save(); }
  else if(b === 'wizTime') ui.time = v;
  else if(b === 'wizTemp') { ui.tempVal = v; toggleSubmit('[data-act="wizLogSub"][data-arg="temp"]', !!v); }
  else if(b === 'wizNote') { ui.noteVal = v; toggleSubmit('[data-act="wizLogSub"][data-arg="note"]', !!v.trim()); }
  else if(b === 'editTime') ui.editing.time = v;
  else if(b === 'editTemp') ui.editing.value = v;
  else if(b === 'editText') ui.editing.text = v;
  else if(b === 'editNotes') ui.editing.notes = v;
});

/* Init */
render(false);
if(db.sync.enabled && db.sync.passphrase && fbConfigValid()){
  var tryStart = function(n){ if(typeof firebase !== 'undefined'){ if(initFirebase()) startListening(); } else if(n < 40) setTimeout(function(){ tryStart(n+1); }, 100); }; tryStart(0);
}
window.addEventListener('online', function(){ if(db.sync.enabled && sync.pending) pushAll(); if(db.sync.enabled && sync.state==='error') startListening(); });
</script>
</body>
</html>
